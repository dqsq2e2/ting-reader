services:
  ting-reader:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: ting-reader
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./plugins:/app/plugins
      - ./temp:/app/temp
      - ./storage:/app/storage
      # Optional: mount multiple host media folders under /app/storage.
      # They will appear as subdirectories in the admin directory picker.
      # Use :ro for scan/playback only, or :rw if metadata/NFO writing is enabled.
      # - /mnt/disk1/audiobooks:/app/storage/audiobooks:ro
      # - /mnt/disk2/story:/app/storage/story:ro
      # - /mnt/nas/books:/app/storage/nas-books:rw
    environment:
      - RUST_LOG=info
      - TING_SERVER__HOST=0.0.0.0
      - TING_SERVER__PORT=3000
      - TING_SECURITY__JWT_SECRET=ting_reader_jwt_secret_change_me_in_prod
      - TEMP_DIR=/app/temp
      - DATA_DIR=/app/data
      - STORAGE_DIR=/app/storage
