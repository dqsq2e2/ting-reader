name: Native FPK Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  native:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86
            fpk_suffix: x86_64
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            arch: arm
            fpk_suffix: arm64
            use_cross: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release context
        id: release_context
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="beta"
            VERSION="beta"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TARGET="formal"
            VERSION="${GITHUB_REF_NAME#v}"
          else
            echo "Unsupported release trigger: ${{ github.event_name }} / ${{ github.ref_type }}"
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "Resolved $TARGET build for version $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross

      - name: Install Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Inject OpenSSL Vendored Dependency
        run: |
          cd backend
          # Inject openssl vendored dependency for static linking to avoid shared library issues
          if ! grep -q "^openssl" Cargo.toml; then
            sed -i '/^\[dependencies\]/a openssl = { version = "0.10", features = ["vendored"] }' Cargo.toml
            echo "Injected OpenSSL vendored dependency."
          else
            echo "OpenSSL dependency found, assuming it's correct."
          fi
          # Print first 20 lines to verify
          head -n 20 Cargo.toml

      - name: Build Backend
        run: |
          cd backend
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            # Create Cross.toml to install openssl dependencies in the container for ARM
            if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
              printf "[target.aarch64-unknown-linux-gnu]\npre-build = [\n    \"dpkg --add-architecture arm64\",\n    \"apt-get update && apt-get install -y libssl-dev:arm64\"\n]\n" > Cross.toml
            fi
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Prepare App Directory
        run: |
          mkdir -p .github/ting-reader-fpk-native/app/server
          mkdir -p .github/ting-reader-fpk-native/app/server/preinstalled-plugins
          echo "Listing target directory:"
          find backend/target -type f | grep "ting_reader" || true
          find backend/target -type f | grep "ting-reader" || true
          
          # Try to find binary with underscore (default for cargo) or hyphen
          BINARY_PATH=$(find backend/target -type f \( -name "ting_reader" -o -name "ting-reader" \) | grep "${{ matrix.target }}/release/ting[-_]reader$" | head -n 1)
          
          if [ -z "$BINARY_PATH" ]; then
            echo "Error: ting-reader binary not found in target directory!"
            exit 1
          fi
          
          echo "Found binary at: $BINARY_PATH"
          # Always copy as ting-reader (hyphen) to match scripts
          cp "$BINARY_PATH" .github/ting-reader-fpk-native/app/server/ting-reader
          
          cp backend/config.toml .github/ting-reader-fpk-native/app/server/
          cp -r frontend/dist .github/ting-reader-fpk-native/app/server/static
          PLUGIN_STORE_VERSION="1.0.0"
          curl -fL "https://github.com/dqsq2e2/ting-reader-plugin-store/releases/download/v${PLUGIN_STORE_VERSION}/ting-reader-plugin-store-${PLUGIN_STORE_VERSION}.tr" \
            -o .github/ting-reader-fpk-native/app/server/preinstalled-plugins/ting-reader-plugin-store.tr
          chmod +x .github/ting-reader-fpk-native/app/server/ting-reader
          chmod +x .github/ting-reader-fpk-native/cmd/*

      - name: Prepare fnpack
        run: |
          # Use local fnpack if available, otherwise assume it's in PATH or download it
          if [ ! -f /usr/local/bin/fnpack ]; then
            chmod +x .github/workflows/fnpack
            sudo cp .github/workflows/fnpack /usr/local/bin/fnpack
          fi

      - name: Build FPK
        run: |
          VERSION="${{ env.VERSION }}"
          TARGET="${{ steps.release_context.outputs.target }}"
          
          if [ "$TARGET" = "beta" ]; then
            echo "Building for Beta release..."
            VERSION="beta"
            OUTPUT_NAME="ting-reader-native-${{ matrix.fpk_suffix }}-beta.fpk"
          else
            echo "Building for Formal release v$VERSION..."
            OUTPUT_NAME="ting-reader-native-${{ matrix.fpk_suffix }}-${VERSION}.fpk"
          fi
          
          # Update manifest with version
          sed -i "s/^version[[:space:]]*=.*/version = $VERSION/" .github/ting-reader-fpk-native/manifest
          
          # 删除可能已存在的 arch/platform 行
          sed -i "/^arch[[:space:]]*=/d" .github/ting-reader-fpk-native/manifest
          sed -i "/^platform[[:space:]]*=/d" .github/ting-reader-fpk-native/manifest

          # 确保文件末尾有换行，避免追加到行尾
          sed -i -e '$a\' .github/ting-reader-fpk-native/manifest

          # 在 version 行之后插入 platform 行
          sed -i "/^version[[:space:]]*=/a platform = ${{ matrix.arch }}" .github/ting-reader-fpk-native/manifest
          
          fnpack build --directory .github/ting-reader-fpk-native
          mv ting-reader.fpk "$OUTPUT_NAME"

      - name: Update Beta Tag
        if: steps.release_context.outputs.target == 'beta'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -f beta
          git push origin beta --force

      - name: Release Beta FPK
        uses: softprops/action-gh-release@v1
        if: steps.release_context.outputs.target == 'beta'
        with:
          tag_name: beta
          name: Beta Release
          body: "Latest beta build of ting-reader native FPK."
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: ting-reader-native-${{ matrix.fpk_suffix }}-beta.fpk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Formal FPK
        uses: softprops/action-gh-release@v1
        if: steps.release_context.outputs.target == 'formal'
        with:
          tag_name: v${{ env.VERSION }}
          files: ting-reader-native-${{ matrix.fpk_suffix }}-${{ env.VERSION }}.fpk
          fail_on_unmatched_files: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
