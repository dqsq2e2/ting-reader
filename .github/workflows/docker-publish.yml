name: Docker Build, Push and FPK Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FNPACK_VERSION: "1.2.3"
  FYGOPACK_VERSION: "1.2.3"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      target: ${{ steps.get_version.outputs.target }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release context
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="beta"
            VERSION="beta"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TARGET="formal"
            VERSION="${GITHUB_REF_NAME#v}"
          else
            echo "Unsupported release trigger: ${{ github.event_name }} / ${{ github.ref_type }}"
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "Resolved $TARGET build for version $VERSION"

  docker:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=dqsq2e2/ting-reader,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [prepare, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          if [ "${{ needs.prepare.outputs.target }}" = "beta" ]; then
            echo "Building beta image..."
            docker buildx imagetools create \
              --tag dqsq2e2/ting-reader:beta \
              $(printf 'dqsq2e2/ting-reader@sha256:%s ' *)
          else
            echo "Building release images for version $VERSION..."
            docker buildx imagetools create \
              --tag dqsq2e2/ting-reader:latest \
              --tag dqsq2e2/ting-reader:$VERSION \
              $(printf 'dqsq2e2/ting-reader@sha256:%s ' *)
          fi

      - name: Inspect image
        run: |
          if [ "${{ needs.prepare.outputs.target }}" = "beta" ]; then
            docker buildx imagetools inspect dqsq2e2/ting-reader:beta
          else
            docker buildx imagetools inspect dqsq2e2/ting-reader:${{ needs.prepare.outputs.version }}
          fi

  frontend-package:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend package
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          npm ci --prefix frontend
          npm run build --prefix frontend

          mkdir -p package/static
          cp -r frontend/dist/. package/static/
          tar -C package -czf "ting-reader-frontend-${VERSION}.tar.gz" static

      - name: Upload frontend packages
        uses: actions/upload-artifact@v4
        with:
          name: frontend-package
          path: ting-reader-frontend-*.tar.gz
          if-no-files-found: error
          retention-days: 1

  backend-package:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    container: rust:bookworm
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y cmake clang curl

      - name: Build backend package
        working-directory: backend
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          cargo build --release --locked

          mkdir -p package
          mkdir -p package/preinstalled-plugins
          cp target/release/ting_reader package/ting-reader
          cp config.toml package/config.toml
          curl -fL "https://github.com/dqsq2e2/ting-reader-plugin-store/releases/download/v1.0.0/ting-reader-plugin-store-1.0.0.tr" \
            -o package/preinstalled-plugins/ting-reader-plugin-store.tr
          chmod +x package/ting-reader
          tar -C package -czf "../ting-reader-backend-linux-${{ matrix.arch }}-${VERSION}.tar.gz" \
            ting-reader config.toml preinstalled-plugins

      - name: Upload backend package
        uses: actions/upload-artifact@v4
        with:
          name: backend-package-${{ matrix.arch }}
          path: ting-reader-backend-linux-${{ matrix.arch }}-*.tar.gz
          if-no-files-found: error
          retention-days: 1

  release:
    needs: [prepare, merge, frontend-package, backend-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download application packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: '*-package*'
          merge-multiple: true

      - name: Add deployment scripts
        run: |
          cp scripts/deploy.sh release-assets/deploy.sh
          cp scripts/manage-libraries.sh release-assets/manage-libraries.sh
          chmod +x release-assets/deploy.sh release-assets/manage-libraries.sh

      - name: Setup fnpack
        uses: ./.github/actions/setup-fnpack
        with:
          version: ${{ env.FNPACK_VERSION }}

      - name: Setup fygopack
        uses: ./.github/actions/setup-fygopack
        with:
          version: ${{ env.FYGOPACK_VERSION }}

      - name: Build FPK (Formal)
        if: needs.prepare.outputs.target == 'formal'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          cp .github/ting-reader-fpk/manifest .github/ting-reader-fpk/manifest.bak
          sed -i "s/^version[[:space:]]*=.*/version = $VERSION/" .github/ting-reader-fpk/manifest

          fnpack build --directory .github/ting-reader-fpk
          mv ting-reader.fpk ting-reader-$VERSION.fpk

          # Keep backup of LICENSE and use English LICENSE for fygopack
          cp .github/ting-reader-fpk/LICENSE .github/ting-reader-fpk/LICENSE.bak
          cp .github/ting-reader-fpk/LICENSE.en .github/ting-reader-fpk/LICENSE

          fygopack build --directory .github/ting-reader-fpk
          mv ting-reader.fpk ting-reader-fygo-$VERSION.fpk

          # Restore Chinese LICENSE
          mv .github/ting-reader-fpk/LICENSE.bak .github/ting-reader-fpk/LICENSE

          mv .github/ting-reader-fpk/manifest.bak .github/ting-reader-fpk/manifest

      - name: Build FPK (Beta)
        if: needs.prepare.outputs.target == 'beta'
        run: |
          sed -i "s/^version[[:space:]]*=.*/version = beta/" .github/ting-reader-fpk/manifest

          fnpack build --directory .github/ting-reader-fpk
          mv ting-reader.fpk ting-reader-beta.fpk

          # Keep backup of LICENSE and use English LICENSE for fygopack
          cp .github/ting-reader-fpk/LICENSE .github/ting-reader-fpk/LICENSE.bak
          cp .github/ting-reader-fpk/LICENSE.en .github/ting-reader-fpk/LICENSE

          fygopack build --directory .github/ting-reader-fpk
          mv ting-reader.fpk ting-reader-fygo-beta.fpk

          # Restore Chinese LICENSE
          mv .github/ting-reader-fpk/LICENSE.bak .github/ting-reader-fpk/LICENSE

      - name: Update Beta Tag
        if: needs.prepare.outputs.target == 'beta'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -f beta
          git push origin beta --force

      - name: Release Beta FPK
        uses: softprops/action-gh-release@v1
        if: needs.prepare.outputs.target == 'beta'
        with:
          tag_name: beta
          name: Beta Release
          body: "Latest beta build of ting-reader FPK."
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: |
            ting-reader-beta.fpk
            ting-reader-fygo-beta.fpk
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Release Notes
        id: extract_notes
        if: needs.prepare.outputs.target == 'formal'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          START_LINE=$(grep -n "## \[$VERSION\]" CHANGELOG.md | cut -d: -f1)
          if [ -n "$START_LINE" ]; then
            tail -n +$START_LINE CHANGELOG.md | sed -n '1p; 2,${/## \[/q; p}' > RELEASE_NOTES.md
          else
            echo "Version $VERSION not found in CHANGELOG.md"
            echo "Full changelog available in CHANGELOG.md" > RELEASE_NOTES.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: needs.prepare.outputs.target == 'formal'
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Release v${{ needs.prepare.outputs.version }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: false
          overwrite_files: true
          files: |
            ting-reader-${{ needs.prepare.outputs.version }}.fpk
            ting-reader-fygo-${{ needs.prepare.outputs.version }}.fpk
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
